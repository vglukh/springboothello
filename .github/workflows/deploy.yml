name: Build and Deploy to Azure

on:
  push:
    branches: [ "master" ] # Спрацьовує при кожному пуші в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and Push to ACR
      run: |
        az acr login --name ${{ secrets.ACR_USERNAME }}
        docker build -t ${{ secrets.ACR_USERNAME }}.azurecr.io/springboothello_my-app:${{ github.sha }} .
        docker push ${{ secrets.ACR_USERNAME }}.azurecr.io/springboothello_my-app:${{ github.sha }}

    - name: Deploy to Azure Container Instances
      uses: azure/aci-deploy@v1
      with:
        resource-group: MyJavaSBCloudProject
        dns-name-label: springboothello-clouds-${{ github.repository_owner }}
        image: ${{ secrets.ACR_USERNAME }}.azurecr.io/springboothello_my-app:${{ github.sha }}
        name: springboothello-clouds
        location: westeurope
        ports: 8080
        environment-variables: |
          SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME=cloudadmin
          SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
          SPRING_JPA_HIBERNATE_DDL_AUTO=update